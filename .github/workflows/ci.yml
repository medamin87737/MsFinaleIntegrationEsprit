# CI/CD — build Maven (réacteur + gateway + eureka + config) + Nest MSNotes + Vite school-portal
# Prérequis : racine du dépôt Git = dossier MS/ (là où se trouvent pom.xml, school-portal/, etc.)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-reactor:
    name: Maven — réacteur (common + 5 MS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: |
            pom.xml
            */pom.xml

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Package (skip tests — activer -DskipTests=false si besoin)
        run: mvn -B -q -DskipTests package -f pom.xml

  java-gateway:
    name: Maven — API Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: demoApiGatewayApplication/pom.xml

      - name: Package gateway
        working-directory: demoApiGatewayApplication
        run: chmod +x mvnw && ./mvnw -B -q -DskipTests package

  java-eureka:
    name: Maven — Eureka Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: demoEurekaServer/pom.xml

      - name: Package Eureka
        working-directory: demoEurekaServer
        run: chmod +x mvnw && ./mvnw -B -q -DskipTests package

  java-config:
    name: Maven — Config Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: demoConfigServer/pom.xml

      - name: Package Config Server
        working-directory: demoConfigServer
        run: chmod +x mvnw && ./mvnw -B -q -DskipTests package

  nest-msnotes:
    name: NestJS — MSNotes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: MSNotes4twin6/package-lock.json

      - name: Build MSNotes
        working-directory: MSNotes4twin6
        run: npm ci && npm run build

  vite-portal:
    name: Vite — school-portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: school-portal/package-lock.json

      - name: Build portail
        working-directory: school-portal
        run: npm ci && npm run build
