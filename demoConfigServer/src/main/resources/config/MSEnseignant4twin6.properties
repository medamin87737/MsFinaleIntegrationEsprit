welcome.message=Welcome to MSEnseignant4twin6 MS
server.port=8083

eureka.client.service-url[defaultZone]=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.hostname=msenseignant4twin6
eureka.instance.prefer-ip-address=false

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/school-realm/protocol/openid-connect/certs}

# Création des comptes Keycloak alignés sur les fiches (API Admin, utilisateur master admin / admin-cli)
app.keycloak.provisioning.enabled=${KEYCLOAK_PROVISIONING_ENABLED:true}
app.keycloak.admin.server-url=${KEYCLOAK_ADMIN_SERVER_URL:http://keycloak:8080}
app.keycloak.admin.realm=${KEYCLOAK_REALM:school-realm}
app.keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
app.keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
# MySQL (phpMyAdmin) — base existante `enseignants_db`, table `enseignants`
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/enseignants_db?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
