welcome.message=Welcome to MSEtudiant4twin6 MS
server.port=8093

# Eureka : dans Docker utiliser le service « eureka-server », pas localhost
eureka.client.service-url[defaultZone]=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Enregistrement Eureka (nom de service Docker pour résolution DNS)
eureka.instance.hostname=msetudiant4twin6
eureka.instance.prefer-ip-address=false

# true par défaut : déclare la file « audit-notes-queue ». Mettre RABBITMQ_ENABLED=false si pas de broker.
app.rabbitmq.enabled=${RABBITMQ_ENABLED:true}
management.health.rabbit.enabled=${RABBITMQ_ENABLED:true}

# RabbitMQ : événements grade.* depuis MSNotes
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.missing-queues-fatal=false

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/school-realm/protocol/openid-connect/certs}

app.keycloak.provisioning.enabled=${KEYCLOAK_PROVISIONING_ENABLED:true}
app.keycloak.admin.server-url=${KEYCLOAK_ADMIN_SERVER_URL:http://keycloak:8080}
app.keycloak.admin.realm=${KEYCLOAK_REALM:school-realm}
app.keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
app.keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
# H2 fichier (convention Twin6 : Classe + Étudiant en H2 ; Enseignant / Matière / Salle en MySQL)
spring.datasource.url=jdbc:h2:file:./Database/Data/etudiants_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=etudiants_user
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2
spring.h2.console.settings.web-allow-others=true
