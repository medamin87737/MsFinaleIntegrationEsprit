welcome.message=Welcome to MSClasse4twin6 MS
server.port=8084

eureka.client.service-url[defaultZone]=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.hostname=msclasse4twin6
eureka.instance.prefer-ip-address=false

# true par défaut : déclare la file « inscription-pedagogique-queue » (visible dans l’UI RabbitMQ 15672). Mettre RABBITMQ_ENABLED=false si pas de broker.
app.rabbitmq.enabled=${RABBITMQ_ENABLED:true}
management.health.rabbit.enabled=${RABBITMQ_ENABLED:true}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.missing-queues-fatal=false

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/school-realm/protocol/openid-connect/certs}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# data.sql après création du schéma (seed démo aligné Keycloak)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
# H2 fichier (convention Twin6 : Classe + Étudiant en H2 ; Enseignant / Matière / Salle en MySQL)
spring.datasource.url=jdbc:h2:file:./Database/Data/classes_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=classes_user
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2
spring.h2.console.settings.web-allow-others=true
