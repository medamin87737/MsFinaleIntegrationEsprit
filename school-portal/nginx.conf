server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS : sans cela, nginx résout api-gateway une seule fois au démarrage.
    # Si le portail démarre avant la gateway, le proxy reste en 502 jusqu’au reload du conteneur.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_gateway_upstream api-gateway:8080;

    # Avec proxy_pass + variable, nginx ne réécrit pas l’URI comme avec une URL littérale :
    # sans rewrite, l’upstream recevrait /api/etudiants/me → 404 sur la gateway (/etudiants/**).
    location /api/ {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://$api_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
