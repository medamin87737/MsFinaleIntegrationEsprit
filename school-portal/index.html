<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <title>Twin6 Campus — Portail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      OAuth / Keycloak : la redirection de login doit être en fenêtre de premier niveau.
      Les aperçus IDE / onglets « Simple Browser » chargent souvent la page dans un cadre :
      erreur « Unsafe attempt to load URL … from frame » + chrome-error://chromewebdata.
      Ce script synchrone s’exécute avant tout module Vite / keycloak-js.
    -->
    <script>
      (function () {
        try {
          if (window.self !== window.top) {
            window.top.location.replace(window.location.href);
          }
        } catch (e) {
          window.__TWIN6_IFRAME_BLOCKED__ = true;
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
