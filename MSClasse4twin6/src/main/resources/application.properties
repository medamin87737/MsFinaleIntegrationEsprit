spring.cloud.config.enabled=true
spring.config.import=optional:configserver:
spring.cloud.config.uri=http://config-server:8888

spring.application.name=MSClasse4twin6

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url[defaultZone]=http://eureka-server:8761/eureka

# Messagerie : true par défaut si RabbitMQ tourne (files visibles dans l’UI 15672). RABBITMQ_ENABLED=false pour désactiver.
app.rabbitmq.enabled=${RABBITMQ_ENABLED:true}
management.health.rabbit.enabled=${RABBITMQ_ENABLED:true}

# RabbitMQ (écoute inscription.created depuis MSNotes)
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.missing-queues-fatal=false

management.endpoints.web.exposure.include=refresh

welcome.message=Welcome to MSClasse4twin6 MS

# Repli si Config Server indisponible (même logique que MSEtudiant).
spring.datasource.url=jdbc:h2:file:./Database/Data/classes_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=classes_user
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2
spring.h2.console.settings.web-allow-others=true
