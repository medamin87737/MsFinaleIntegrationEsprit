# Exemple non exhaustif — à personnaliser (image + secrets).
apiVersion: v1
kind: Service
metadata:
  name: demo-api-gateway
spec:
  selector:
    app: demo-api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-api-gateway
  template:
    metadata:
      labels:
        app: demo-api-gateway
    spec:
      containers:
        - name: gateway
          image: your-registry/twin6-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              value: http://eureka:8761/eureka
            - name: KEYCLOAK_ISSUER_URI
              value: https://keycloak.example/realms/school-realm
            - name: KEYCLOAK_JWK_SET_URI
              value: https://keycloak.example/realms/school-realm/protocol/openid-connect/certs
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
