# Sécurité OAuth2 / JWT (Keycloak). Surcharge possible via variables KEYCLOAK_*.
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/school-realm/protocol/openid-connect/certs}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    urls:
      - name: MSEtudiant4twin6
        url: /central-docs/MSEtudiant4twin6/v3/api-docs
      - name: MSClasse4twin6
        url: /central-docs/MSClasse4twin6/v3/api-docs
      - name: MSMatiere4twin6
        url: /central-docs/MSMatiere4twin6/v3/api-docs
      - name: MSSalle4twin6
        url: /central-docs/MSSalle4twin6/v3/api-docs
      - name: MSEnseignant4twin6
        url: /central-docs/MSEnseignant4twin6/v3/api-docs
      - name: MSNotes4twin6
        url: /central-docs/MSNotes4twin6/v3/api-docs
