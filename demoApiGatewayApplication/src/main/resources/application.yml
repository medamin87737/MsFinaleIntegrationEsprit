# Sécurité OAuth2 / JWT (Keycloak). Les URLs peuvent être surchargées en Docker (host.docker.internal).
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/school-realm}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/school-realm/protocol/openid-connect/certs}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: MSEtudiant4twin6
        url: /central-docs/MSEtudiant4twin6/v3/api-docs
      - name: MSClasse4twin6
        url: /central-docs/MSClasse4twin6/v3/api-docs
      - name: MSMatiere4twin6
        url: /central-docs/MSMatiere4twin6/v3/api-docs
      - name: MSSalle4twin6
        url: /central-docs/MSSalle4twin6/v3/api-docs
      - name: MSEnseignant4twin6
        url: /central-docs/MSEnseignant4twin6/v3/api-docs
