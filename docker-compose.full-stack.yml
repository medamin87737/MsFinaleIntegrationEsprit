# Stack complète Twin6 : Eureka, Config Server, Gateway, MS Spring, MSNotes, infra.
# Prérequis : Docker Desktop (Windows/Mac) avec host.docker.internal, ou Linux + extra_hosts.
#
# Lancement :
#   cd MS
#   docker compose -f docker-compose.full-stack.yml up -d --build
#
# URLs : voir DOCKER-FULLSTACK.md

name: twin6-campus

x-extra-hosts: &extra_hosts
  - "host.docker.internal:host-gateway"

x-spring-cloud-env: &spring_cloud
  SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
  EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka
  SPRING_RABBITMQ_HOST: rabbitmq
  KEYCLOAK_ISSUER_URI: http://host.docker.internal:8180/realms/school-realm
  KEYCLOAK_JWK_SET_URI: http://host.docker.internal:8180/realms/school-realm/protocol/openid-connect/certs
  KEYCLOAK_URL: http://host.docker.internal:8180

services:
  eureka:
    build:
      context: ./demoEurekaServer
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    networks:
      - twin6

  config-server:
    build:
      context: ./demoConfigServer
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka
    depends_on:
      - eureka
    networks:
      - twin6
    extra_hosts: *extra_hosts

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - twin6

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - twin6

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    command:
      - start-dev
      - --http-port=8180
      - --hostname-strict=false
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/8180 && echo -e 'GET /realms/school-realm HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && timeout 3 cat <&3 | grep -q 'HTTP/1.1 200'",
        ]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s
    networks:
      - twin6

  gateway:
    build:
      context: ./demoApiGatewayApplication
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      <<: *spring_cloud
    depends_on:
      - eureka
      - config-server
    networks:
      - twin6
    extra_hosts: *extra_hosts

  msetudiant4twin6:
    build:
      context: .
      dockerfile: docker/spring-ms.Dockerfile
      args:
        MS_MODULE: MSEtudiant4twin6
    environment:
      <<: *spring_cloud
      APP_GATEWAY_BASE_URL: http://gateway:8080
    depends_on:
      - eureka
      - config-server
      - rabbitmq
    networks:
      - twin6
    extra_hosts: *extra_hosts
    restart: on-failure

  msclasse4twin6:
    build:
      context: .
      dockerfile: docker/spring-ms.Dockerfile
      args:
        MS_MODULE: MSClasse4twin6
    environment:
      <<: *spring_cloud
    depends_on:
      - eureka
      - config-server
      - rabbitmq
    networks:
      - twin6
    extra_hosts: *extra_hosts
    restart: on-failure

  msmatiere4twin6:
    build:
      context: .
      dockerfile: docker/spring-ms.Dockerfile
      args:
        MS_MODULE: MSMatiere4twin6
    environment:
      <<: *spring_cloud
    depends_on:
      - eureka
      - config-server
      - rabbitmq
    networks:
      - twin6
    extra_hosts: *extra_hosts
    restart: on-failure

  mssalle4twin6:
    build:
      context: .
      dockerfile: docker/spring-ms.Dockerfile
      args:
        MS_MODULE: MSSalle4twin6
    environment:
      <<: *spring_cloud
    depends_on:
      - eureka
      - config-server
      - rabbitmq
    networks:
      - twin6
    extra_hosts: *extra_hosts
    restart: on-failure

  msenseignant4twin6:
    build:
      context: .
      dockerfile: docker/spring-ms.Dockerfile
      args:
        MS_MODULE: MSEnseignant4twin6
    environment:
      <<: *spring_cloud
    depends_on:
      - eureka
      - config-server
      - rabbitmq
    networks:
      - twin6
    extra_hosts: *extra_hosts
    restart: on-failure

  msnotes4twin6:
    build:
      context: ./MSNotes4twin6
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_HOST: eureka
      EUREKA_PORT: "8761"
      MONGODB_URI: mongodb://mongodb:27017/ms_notes
      RABBITMQ_URI: amqp://guest:guest@rabbitmq:5672
      KEYCLOAK_ISSUER: http://host.docker.internal:8180/realms/school-realm
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka:
        condition: service_started
    networks:
      - twin6
    extra_hosts: *extra_hosts
    restart: on-failure

networks:
  twin6:
    driver: bridge

volumes:
  mongo_data: {}
