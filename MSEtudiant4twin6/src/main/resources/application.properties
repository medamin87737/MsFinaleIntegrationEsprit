spring.cloud.config.enabled=true
spring.config.import=optional:configserver:
spring.cloud.config.uri=http://config-server:8888

spring.application.name=MSEtudiant4twin6

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url[defaultZone]=http://eureka-server:8761/eureka

app.rabbitmq.enabled=${RABBITMQ_ENABLED:true}
management.health.rabbit.enabled=${RABBITMQ_ENABLED:true}

# RabbitMQ (audit des événements grade.* depuis MSNotes) — 127.0.0.1 si guest ne répond pas sur ::1
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.missing-queues-fatal=false

management.endpoints.web.exposure.include=refresh

welcome.message=Welcome to MSEtudiant4twin6 MS

# Si le Config Server (8888) n’est pas joignable, ces valeurs évitent l’absence de JDBC (erreur Hibernate « Unable to determine Dialect »).
spring.datasource.url=jdbc:h2:file:./Database/Data/etudiants_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=etudiants_user
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2
spring.h2.console.settings.web-allow-others=true

# Agrégation portail étudiant (notes / matières / classe) via la gateway
app.gateway.base-url=http://api-gateway:8080

# Client OAuth2 machine → gateway (client confidentiel Keycloak « school-gateway »)
spring.security.oauth2.client.registration.gateway-kc.client-id=school-gateway
spring.security.oauth2.client.registration.gateway-kc.client-secret=schoolGatewaySecretDev2024
spring.security.oauth2.client.registration.gateway-kc.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.gateway-kc.client-authentication-method=client_secret
spring.security.oauth2.client.registration.gateway-kc.provider=keycloak
spring.security.oauth2.client.registration.gateway-kc.scope=openid
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_URL:http://keycloak:8080}/realms/school-realm/protocol/openid-connect/token
