spring.cloud.config.enabled=true
spring.config.import=optional:configserver:
spring.cloud.config.uri=http://localhost:8888

spring.application.name=MSEtudiant4twin6

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.default-zone=http://localhost:8761/eureka

# RabbitMQ (audit des événements grade.* depuis MSNotes)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

management.endpoints.web.exposure.include=refresh

welcome.message=Welcome to MSEtudiant4twin6 MS

# Agrégation portail étudiant (notes / matières / classe) via la gateway
app.gateway.base-url=http://localhost:8080

# Client OAuth2 machine → gateway (client confidentiel Keycloak « school-gateway »)
spring.security.oauth2.client.registration.gateway-kc.client-id=school-gateway
spring.security.oauth2.client.registration.gateway-kc.client-secret=schoolGatewaySecretDev2024
spring.security.oauth2.client.registration.gateway-kc.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.gateway-kc.client-authentication-method=client_secret
spring.security.oauth2.client.registration.gateway-kc.provider=keycloak
spring.security.oauth2.client.registration.gateway-kc.scope=openid
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_URL:http://localhost:8180}/realms/school-realm/protocol/openid-connect/token
