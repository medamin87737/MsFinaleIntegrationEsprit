spring.application.name=eureka
server.port=8761
server.address=0.0.0.0

eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Docker: le hostname par défaut du conteneur n’est pas résolu par DNS → getLocalHost() échoue
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:eureka-server}

